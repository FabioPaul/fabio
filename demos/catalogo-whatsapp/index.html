<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Catálogo digital para negocios — Consultá productos por WhatsApp.">
  <title>Catálogo Express | Demo WhatsApp</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

  <header class="catalog-header">
    <div class="container">
      <div class="d-flex justify-content-between align-items-center py-3">
        <a href="../../index.html" class="back-link"><i class="bi bi-arrow-left"></i> Portfolio</a>
        <span class="demo-badge">Demo Catálogo</span>
      </div>
      <div class="text-center pb-4 pb-lg-5">
        <div class="store-avatar">
          <i class="bi bi-shop"></i>
        </div>
        <h1 class="store-name">Boutique Luna</h1>
        <p class="store-desc">Moda y accesorios para toda la familia · Consultá por WhatsApp</p>
        <a href="https://wa.me/595985903081?text=Hola%2C%20quiero%20consultar%20por%20sus%20productos"
           class="btn btn-whatsapp" target="_blank" rel="noopener noreferrer">
          <i class="bi bi-whatsapp"></i> Contactar tienda
        </a>
      </div>
    </div>
  </header>

  <div class="container pb-5">
    <!-- Filtros -->
    <div class="filters-bar sticky-filters">
      <div class="row g-2 align-items-center">
        <div class="col-md-5">
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="search" class="form-control" id="searchInput" placeholder="Buscar productos...">
          </div>
        </div>
        <div class="col-md-4">
          <select class="form-select" id="categoryFilter">
            <option value="">Todas las categorías</option>
          </select>
        </div>
        <div class="col-md-3">
          <button class="btn btn-outline-danger w-100" id="btnFavorites" type="button">
            <i class="bi bi-heart-fill"></i> Favoritos (<span id="favCount">0</span>)
          </button>
        </div>
      </div>
      <div class="category-pills mt-3" id="categoryPills"></div>
    </div>

    <p class="text-muted small mt-3 mb-3" id="resultsInfo"></p>
    <div class="row g-3 g-md-4" id="productsGrid"></div>

    <div class="text-center py-5 d-none" id="noResults">
      <i class="bi bi-inbox display-4 text-muted"></i>
      <p class="mt-3 text-muted">No hay productos con esos filtros.</p>
    </div>
  </div>

  <!-- Modal vista rápida -->
  <div class="modal fade" id="quickViewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content border-0 rounded-4 overflow-hidden" id="quickViewContent"></div>
    </div>
  </div>

  <footer class="catalog-footer">
    <div class="container text-center">
      <p class="mb-1"><strong>Boutique Luna</strong> — Demo Catálogo WhatsApp</p>
      <p class="text-muted small mb-0">Desarrollado por <a href="../../index.html">Fabio Areco</a></p>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
